<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AB Layout</title>

<!-- Office JS (must stay CDN) -->
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

<!-- 🔥 LOCAL FIRST (offline safe) -->
<link rel="stylesheet" href="styles.css" />

</head>

<body oncontextmenu="return false;"> <!-- 🚫 Right-click disabled -->

<!-- THEME -->
<div style="text-align:right; font-size:12px; cursor:pointer;" onclick="toggleTheme()">
  🌗 Theme
</div>

<header class="header">
  <div class="title-row">
    <span class="icon">⚖</span>
    <h1>AB Layout</h1>
  </div>
  <div class="subtitle" id="subtitle">Advocate Benefit Layout</div>
</header>

<hr />

<main>

  <section class="section">
    <label for="courtSelect">Layout</label>
    <select id="courtSelect"></select>
  </section>

  <section class="section">
    <button id="applyBtn" onclick="applySelected()" disabled>
      Apply Layout
    </button>

    <button id="undoBtn" class="secondary" onclick="undoLayout()" disabled>
      Undo
    </button>
  </section>

  <section id="status" class="status">Initializing engine...</section>

</main>

<footer class="footer">
  <span id="version">v3.1.0</span>
  <span> • </span>
  <span id="engineState">Initializing...</span>
</footer>

<!-- 🔥 LOCAL ENGINE -->
<script src="taskpane.js"></script>

<script>

/* ===== CONFIG ===== */

const CONFIG = {
  remote: "https://ratiojuris.github.io/ab-layout/layouts/layouts.json",
  local: "layouts/layouts.json"
};

/* ===== UI ===== */

const UI = {
  version: document.getElementById("version"),
  subtitle: document.getElementById("subtitle"),
  status: document.getElementById("status"),
  applyBtn: document.getElementById("applyBtn"),
  undoBtn: document.getElementById("undoBtn"),
  engineState: document.getElementById("engineState")
};

/* ===== SAFE FETCH (ONLINE → OFFLINE FALLBACK) ===== */

async function fetchLayouts() {
  try {
    const res = await fetch(CONFIG.remote);
    if (!res.ok) throw "remote fail";
    return await res.json();
  } catch {
    console.warn("⚠️ Offline mode activated");

    const res = await fetch(CONFIG.local);
    return await res.json();
  }
}

/* ===== META LOAD ===== */

fetchLayouts().then(data => {

  const meta = data._meta || {};

  if (meta.version) UI.version.innerText = "v" + meta.version;
  if (meta.description) UI.subtitle.innerText = meta.description;

});

/* ===== UI HOOKS ===== */

function uiSetStatus(msg, type="info") {
  UI.status.innerText = msg;
  UI.status.className = "status " + type;
}

function uiSetEngineState(state) {
  UI.engineState.innerText = state;
}

function uiEnableApply(v) {
  UI.applyBtn.disabled = !v;
}

function uiEnableUndo(v) {
  UI.undoBtn.disabled = !v;
}

/* ===== THEME ===== */

function toggleTheme() {
  const current = document.documentElement.getAttribute("data-theme");
  const next = current === "dark" ? "light" : "dark";

  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("theme", next);
}

const savedTheme = localStorage.getItem("theme");
if (savedTheme) {
  document.documentElement.setAttribute("data-theme", savedTheme);
}

/* ===== WORD SYNC ===== */

Office.onReady(() => {
  try {
    const theme = Office.context.officeTheme;

    if (!savedTheme && theme?.bodyBackgroundColor) {
      document.body.style.backgroundColor = theme.bodyBackgroundColor;
      document.body.style.color = theme.bodyForegroundColor;
    }
  } catch {}
});

</script>

</body>
</html>
